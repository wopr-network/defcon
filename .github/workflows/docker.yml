name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wopr-network/holyship:staging
            ghcr.io/wopr-network/holyship:${{ github.sha }}

  deploy-staging:
    runs-on: [self-hosted, Linux, X64]
    needs: build-push
    environment: staging
    env:
      IMAGE: ghcr.io/wopr-network/holyship
      COMPOSE_DIR: /opt/holyship
    steps:
      - name: Record previous image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: COMPOSE_DIR
          script: |
            CURRENT=$(docker inspect --format='{{.Config.Image}}' holyship-staging-api-1 2>/dev/null | grep -oP ':\K[a-f0-9]{7,}$' || true)
            if [ -n "$CURRENT" ]; then
              echo "$CURRENT" > ${COMPOSE_DIR}/.previous-staging-sha
              echo "Recorded previous SHA: $CURRENT"
            else
              echo "No previous staging container found"
            fi

      - name: Deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/holyship
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            $COMPOSE stop staging-api 2>/dev/null || true
            $COMPOSE pull staging-api
            $COMPOSE up -d staging-postgres
            sleep 3
            $COMPOSE exec -T staging-postgres psql -U holyship -d holyship -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" 2>/dev/null || true
            docker compose exec -T postgres pg_dump -U holyship --no-owner --no-acl holyship | \
              $COMPOSE exec -T staging-postgres psql -U holyship -d holyship -q
            $COMPOSE up -d staging-api staging-ui
            docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || docker compose restart caddy
            echo "Staging deployed"

      - name: Health check
        id: health
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            for i in $(seq 1 30); do
              if docker exec holyship-staging-api-1 curl -sf http://localhost:3001/health >/dev/null 2>&1; then
                echo "Staging API is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "Health check timed out"
            docker logs holyship-staging-api-1 --tail 20
            exit 1

      - name: Rollback on failure
        if: steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: COMPOSE_DIR,IMAGE
          script: |
            echo "Health check failed — rolling back staging-api"
            cd ${COMPOSE_DIR}
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            $COMPOSE logs --tail=30 staging-api
            PREV_TAG=$(cat ${COMPOSE_DIR}/.previous-staging-sha 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              echo "Rolling back to ${IMAGE}:${PREV_TAG}"
              docker pull ${IMAGE}:${PREV_TAG}
              docker tag ${IMAGE}:${PREV_TAG} ${IMAGE}:staging
              $COMPOSE up -d --force-recreate staging-api
              echo "Rollback complete"
            else
              echo "::warning::No previous image tag available for rollback"
              $COMPOSE stop staging-api
            fi

      - name: Prune old images
        if: steps.health.outcome != 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: docker image prune -f

      - name: Fail workflow if health check failed
        if: steps.health.outcome == 'failure'
        run: |
          echo "::error::Staging deployment health check failed. Rollback executed."
          exit 1
